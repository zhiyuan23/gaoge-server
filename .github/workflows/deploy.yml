name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear Prisma cache
        run: rm -rf node_modules/.prisma node_modules/@prisma

      - name: Generate Prisma Client (for lint/build)
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test || true

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear Prisma cache
        run: rm -rf node_modules/.prisma node_modules/@prisma

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build production package
        run: pnpm build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            mkdir -p ${{ secrets.DEPLOY_PATH }}
          "

      - name: Write environment file on server
        run: |
          if [ -z "${{ secrets.DEPLOY_ENV_FILE }}" ]; then
            echo "GitHub secret DEPLOY_ENV_FILE is empty" >&2
            exit 1
          fi

          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "cat > ${{ secrets.DEPLOY_PATH }}/.env" <<'EOF'
          ${{ secrets.DEPLOY_ENV_FILE }}
          EOF

      - name: Deploy via RSYNC
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.env.production' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='src' \
            --exclude='test' \
            --exclude='tsconfig*' \
            --exclude='.eslint*' \
            --exclude='.prettier*' \
            --exclude='.github' \
            --exclude='*.log' \
            --exclude='logs' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='coverage' \
            ./ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Prepare application on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -lc '
            set -eo pipefail
            export PNPM_HOME=\"\$HOME/.local/share/pnpm\"
            export PATH=\"\$PNPM_HOME:\$HOME/bin:\$PATH\"
            [ -f ~/.bashrc ] && set +u && . ~/.bashrc && set -u || true
            [ -f ~/.profile ] && set +u && . ~/.profile && set -u || true
            set -u

            echo \"Remote user: \$(whoami)\"
            echo \"Deploy path: ${{ secrets.DEPLOY_PATH }}\"
            echo \"PATH=\$PATH\"

            cd ${{ secrets.DEPLOY_PATH }}

            if [ ! -f .env ]; then
              echo \".env file is missing in ${{ secrets.DEPLOY_PATH }}\" >&2
              exit 1
            fi

            command -v node >/dev/null 2>&1 || { echo \"node not found\" >&2; exit 1; }
            command -v pnpm >/dev/null 2>&1 || { echo \"pnpm not found\" >&2; exit 1; }
            command -v pm2 >/dev/null 2>&1 || { echo \"pm2 not found\" >&2; exit 1; }

            node -v
            pnpm --version
            pm2 -v

            pnpm install --frozen-lockfile --production
            export DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"
            pnpm db:generate
          '"

      - name: Run migrations
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -lc '
            set -eo pipefail
            export PNPM_HOME=\"\$HOME/.local/share/pnpm\"
            export PATH=\"\$PNPM_HOME:\$HOME/bin:\$PATH\"
            [ -f ~/.bashrc ] && set +u && . ~/.bashrc && set -u || true
            [ -f ~/.profile ] && set +u && . ~/.profile && set -u || true
            set -u

            cd ${{ secrets.DEPLOY_PATH }}
            export DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"
            pnpm db:migrate:prod
          '"

      - name: Restart PM2
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -lc '
            set -eo pipefail
            export PNPM_HOME=\"\$HOME/.local/share/pnpm\"
            export PATH=\"\$PNPM_HOME:\$HOME/bin:\$PATH\"
            [ -f ~/.bashrc ] && set +u && . ~/.bashrc && set -u || true
            [ -f ~/.profile ] && set +u && . ~/.profile && set -u || true
            set -u

            cd ${{ secrets.DEPLOY_PATH }}
            if pm2 describe gaoge-server >/dev/null 2>&1; then
              pm2 reload ecosystem.config.js --only gaoge-server --update-env
            else
              pm2 start ecosystem.config.js --only gaoge-server --update-env
            fi
            pm2 save
          '"

      - name: Show PM2 status on server
        if: always()
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -lc '
            export PNPM_HOME=\"\$HOME/.local/share/pnpm\"
            export PATH=\"\$PNPM_HOME:\$HOME/bin:\$PATH\"
            [ -f ~/.bashrc ] && set +u && . ~/.bashrc && set -u || true
            [ -f ~/.profile ] && set +u && . ~/.profile && set -u || true

            pm2 status gaoge-server
            pm2 logs gaoge-server --lines 50 --nostream
          '"

      - name: Health check
        run: |
          for i in {1..12}; do
            if curl -fsS ${{ secrets.HEALTH_URL }}; then
              exit 0
            fi
            sleep 5
          done
          exit 1
